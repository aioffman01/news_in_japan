openapi: 3.0.3
info:
  title: NewsInJapan API Spec
  description: 일본 5대 신문사 건축 뉴스 수집 및 한국어 요약/저장 서비스 API 규격서입니다.
  version: 1.1.0
paths:
  /api/v1/auth/login:
    post:
      summary: 대시보드 접근 비밀번호 검증
      description: 대시보드에 접근하기 위한 비밀번호를 확인하고 세션 토큰을 발급받습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 비밀번호 불일치
  /api/v1/news:
    get:
      summary: 수집된 뉴스 목록 조회
      description: DB에 저장된 건축 뉴스 기사 목록을 조회합니다. 날짜 필터링을 지원합니다.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: 조회할 기사 개수
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 조회 대상 발행일 (format YYYY-MM-DD)
        - name: X-Dashboard-Token
          in: header
          required: true
          schema:
            type: string
          description: 인가용 대시보드 암호 인증 토큰
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsResponse'
        '401':
          description: 유효하지 않거나 만료된 세션 토큰
  /api/v1/news/collect:
    post:
      summary: 뉴스 수집 및 요약 작업 트리거
      description: 일본 5대 신문사 RSS 피드를 크롤링하여 전날자 건축 소식을 필터링하고 Gemini API로 한글 번역/요약하여 DB에 저장합니다.
      responses:
        '200':
          description: 성공적으로 작업을 수행함
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  collected_count:
                    type: integer
                    example: 5
components:
  schemas:
    LoginRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          example: "news1234"
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "authenticated_session_token_xyz"
    NewsResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title_ja:
          type: string
          example: "東京の新国立競技場周辺の再開発計画が決定"
        title_ko:
          type: string
          example: "도쿄 신국립경기장 주변 재개발 계획 결정"
        summary_ko:
          type: string
          example: "도쿄의 상징적인 신국립경기장 인근 지역에 대한 새로운 재개발 지침이 공식 승인되었습니다. 친환경 녹지 공간과 고층 업무용 빌딩이 조화롭게 배치될 계획입니다."
        original_url:
          type: string
          example: "https://www.nikkei.com/article/DGXZQOUF12345/"
        publisher:
          type: string
          example: "日本経済新聞"
        published_at:
          type: string
          format: date-time
          example: "2026-07-19T15:30:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-07-20T12:00:00Z"
