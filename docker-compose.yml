version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/news.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - db-data:/data
    restart: always

volumes:
  db-data:
